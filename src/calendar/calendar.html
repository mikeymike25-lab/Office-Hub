<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.2.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="calendar.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-section left">
            <a class="navbar-brand" href="../ServiceDetails/ServiceDetails.html">
                <img src="../../public/Images/officehublogo.png" alt="officehub">
            </a>
        </div>
        <div class="nav-section center">
            <h2 class="calendar-title-text">CALENDAR</h2>
        </div>
        <div class="nav-section right">
            <a href="../UserDash/UserDashboard.html">
                <img src="../../public/Images/userprofile.png" alt="userprofile" id="userprofilepic">
            </a>
        </div>
    </nav>

    <main class="calendar-container">
        <div class="calendar-card">
            <div class="calendar-controls">
                <button class="nav-btn" onclick="changeMonth(-1)">❮ Prev</button>
                <button class="nav-btn" onclick="changeMonth(1)">Next ❯</button>
            </div>
            
            <h1 id="monthDisplay">MARCH</h1>
            
            <div class="calendar-board">
                <div class="day-name">SUN</div>
                <div class="day-name">MON</div>
                <div class="day-name">TUE</div>
                <div class="day-name">WED</div>
                <div class="day-name">THU</div>
                <div class="day-name">FRI</div>
                <div class="day-name">SAT</div>
                
                <div id="calendarDays" class="days-grid"></div>
            </div>
        </div>
    </main>

    <script src="calendar.js"></script>
</body>
</html>
