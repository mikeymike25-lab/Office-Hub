<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office-Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.2.1/dist/css/bootstrap.min.css"
        integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="UserDashboard.css">
</head>

<body>
    <nav class="navbar navbar-expand-md">
            <a class="navbar-brand" href="officehub.html"><img src="Images/officehublogo.png" alt="officehub"></a>
            <h2 class="text font-weight-bold" style="color: rgb(255, 255, 255);"> USER DASHBOARD</h2>
            <a class="navbar-brand ml-auto" href="#"><img src="Images/userprofile.png" alt="userprofile"
                    id="userprofilepic"></a>
    </nav>

    <!-- Dashboard layout: sidebar + edit form -->
    <div class="dashboard-container">
        <aside class="dashboard-sidebar">
            <div class="profile-card">
                <div class="profile-picture">
                    <button type="button" id="profileBtn">
                        <img src="src/assets/Images/userprofile.png" alt="User Profile" />
                    </button>
                </div>
                <h2 class="user-name">User Name</h2>
                <h6 class="user-email">YourEmail@gmail.com</h6>
            </div>
    
    <!-- Change Profile Modal -->
        <div id="profileModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div class="modal-header">
                    <h2 style="color: white;">Change Profile Picture</h2>
                </div>
                <div id="dropArea" class="drop-area">
                    <p>Drag & drop an image here or <span id="fileLink">browse</span></p>
                    <input type="file" id="profilePictureInput" accept="image/*" style="display: none;">
                </div>
                <div id="imagePreview" class="image-preview" style="display: none;">
                    <img id="previewImg" src="" alt="Preview">
                </div>
                    <div class="preview-actions">
                        <button id="cancelBtn" class="btn btn-danger mt-3"><span id="fileLink">Revert Changes</span></button>
                        <button id="saveBtn" class="btn btn-success mt-3">Save Changes</button>
                    </div>
            </div>
        </div>
        
            <nav class="dashboard-nav">
                <a href="UserDashboard.html" class="dashboard-link active">User Profile</a>
                <a href="#" id="changeAccountBtn" class="dashboard-link">Change Account</a>
                <a href="#" id="signOutBtn" class="dashboard-link">Sign out</a>
            </nav>
        </aside>

    <!-- Change/Create new Account Modal -->
    
    <div id="ChangeAccountModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-header">
                <h2 style="color: white;">Change Account</h2>
            </div>
            <p>Choose an option below:</p>
            <div class="account-options">
                <button href="#" id="createAccountBtn" class="btn btn-primary">Create New Account</button> <!--log out on back end, redirect to register page-->
                <button id="selectAccountBtn" class="btn btn-secondary">Select Existing Account</button>
            </div>
        </div>    
    </div>

    <!-- Sign Out Modal -->

    <div id="SignOutModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 style="color: white;">Sign Out</h2>
            </div>
                <p>Are you sure you want to sign out?</p>
            <div style="display: flex; justify-content: center;">
                <img src="src/assets/Images/SignOutWarningImg.jpg" alt="Sign Out" style="width: 100px; margin: 20px 0;">
            </div>  
            <div style="display: flex; justify-content: center; gap: 20px;">
                <button id="confirmsoBtn" class="btn btn-danger">Yes, Sign Out</button>
                <button id="cancelsoBtn" class="btn btn-secondary">Cancel</button>
            </div>  
                <div style="display: flex; justify-content: center; gap: 20px;">
            </div>
        </div>
    </div>



    <div id="overlay" class="overlay"></div>
        <main class="dashboard-main">
            <div class="edit-card">
                <div class="edit-card-header">
                    <h1>User Profile</h1>
                </div>



                <div class="form-actions" style="display: flex; justify-content: flex-end; align-items: center; gap: 10px;">
                    <button id="editProfileBtn" class="btn save-btn" type="button">Edit Profile</button>
                </div>

                <form class="profile-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input id="username" type="text" placeholder="User-Name" readonly />
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input id="email" type="email" placeholder="YourEmail@gmail.com" readonly />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input id="firstName" type="text" placeholder="First-Name" readonly />
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input id="lastName" type="text" placeholder="Last-Name" readonly />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="birthdate">Birthdate</label>
                            <input id="birthdate" type="date" placeholder="MM/DD/YYYY" readonly />
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input id="phone" type="tel" placeholder="0912-345-6789" readonly />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group full-width">
                            <label for="password">Password</label>
                        <div class="input-icon-wrapper">
                            <input id="password" type="password" placeholder="***************" readonly>
                                <i class="fas fa-eye password-toggle" id="togglePassword" title="Show/hide password"></i>
                            </input>
                        </div>
                    </div>
                </form>
            </div>
        </main>
    </div>

            <!-- Edit Profile Modal connected to the edit profile button -->

        <div id="edit-profile-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 style="color: white;">Edit Profile Details</h2>
                </div>
                <form class="edit-profile-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="editUsername">Username</label>
                            <input id="editUsername" type="text" placeholder="User-Name" />
                        </div>
                        <div class="form-group">
                            <label for="editEmail">Email</label>
                            <input id="editEmail" type="email" placeholder="YourEmail@gmail.com" />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="editFirstName">First Name</label>
                            <input id="editFirstName" type="text" placeholder="First-Name" />
                        </div>
                        <div class="form-group">
                            <label for="editLastName">Last Name</label>
                            <input id="editLastName" type="text" placeholder="Last-Name" />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="editBirthdate">Birthdate</label>
                            <input id="editBirthdate" type="date" placeholder="MM/DD/YYYY" />
                        </div>
                        <div class="form-group">
                            <label for="editPhone">Phone Number</label>
                            <input id="editPhone" type="tel" placeholder="0912-345-6789" />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group full-width">
                            <label for="editPassword">Password</label>
                        <div class="input-icon-wrapper">
                            <input id="editPassword" type="password" placeholder="***************">
                                <i class="fas fa-eye password-toggle" id="editTogglePassword" title="Show/hide password"></i>
                            </input>
                        </div>
                    </div>
                </form>
                <div class="form-actions" style="display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; border-top: 5px solid rgba(53, 88, 114, 0.25); padding-top: 1rem;">
                    <div id="center-buttons" style="justify-content: center; align-items: center;">
                        <button class="btn cancel-btn" type="button">Cancel</button>
                        <button class="btn save-btn" type="button">Save Changes</button>
                    </div>
                </div>
            </div>
        </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.6/dist/umd/popper.min.js"
        integrity="sha384-wHAiFfRlMFy6i5SRaxvfOCifBUQy1xHdJ/yoi7FRNXMRBu5WHdZYu1hA6ZOblgut"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.2.1/dist/js/bootstrap.min.js"
        integrity="sha384-B0UglyR+jN6CkvvICOB2joaf5I4l3gm9GU6Hc1og6Ls7i6U/mkkaduKaBhlAXv9k"
        crossorigin="anonymous"></script>
    <script src="UserDashboard.js"></script>
</body>

</html>
