<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking Form</title>
<link rel="stylesheet" href="booking-form.css">
</head>

<body>


<div class="modal">

    <div class="modal-header">

        <div class="icon-circle">
            📋
        </div>

        <h2>CONFIRM</h2>

    </div>

    <div class="modal-body">

        <!-- LEFT CARD -->
        <div class="room-card">

            <div class="room-text">
                <h3>Quiet Corner</h3>
                <p>Duration: weekly</p>
                <p>Price: 100$</p>
                <p>Capacity: 2</p>
            </div>

        </div>


        <!-- FORM -->
        <div class="form-section">

            <label>Name of customer</label>
            <input type="text" placeholder="name">

            <label>Contact</label>
            <input type="text" placeholder="Phone no / gmail">

            <label>company</label>
            <input type="text" placeholder="optional...">

        </div>

    </div>

    <div class="modal-footer">

        <button class="cancel">CANCEL</button>
        <button class="calendar" onclick="window.location.href='../calendar/calendar.html';">
  CALENDAR
</button>
    </div>

</div>

</body>
</html>
